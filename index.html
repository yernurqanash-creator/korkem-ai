<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelbet AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #FDFBF7; /* Ақшыл киіз түсі */
            --text-dark: #2C3E50;
            --gold: #D4AF37; /* Алтын */
            --gold-light: #F4E5B3;
            --accent: #1ABC9C; /* Көгілдір */
            --btn-bg: #2C3E50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-dark);
            margin: 0; padding: 20px; text-align: center;
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
        }
        
        /* Тіл ауыстыру */
        .lang-switch { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 20px; }
        .lang-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 5px 12px; border-radius: 15px; font-size: 12px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }
        .lang-btn.active { background: var(--gold); color: white; }

        .header { font-size: 30px; font-weight: 900; color: var(--btn-bg); margin-bottom: 5px; }
        .header span { color: var(--gold); }
        .subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 25px; }

        /* Фото жүктеу аймағы */
        .upload-box {
            background: white; border: 2px dashed var(--gold); border-radius: 20px;
            padding: 40px 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.1);
        }
        .upload-icon { font-size: 40px; margin-bottom: 10px; }
        #fileInput { display: none; }

        /* Батырмалар */
        .main-btn {
            background: var(--btn-bg); color: white; border: none; padding: 16px 30px;
            font-size: 16px; border-radius: 30px; width: 100%; font-weight: bold;
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3); margin-bottom: 30px; display: none;
        }
        .main-btn:active { transform: scale(0.98); }

        /* Пакеттер */
        .packages-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: var(--btn-bg); text-align: left; }
        .package-card {
            background: white; border-left: 5px solid var(--gold); border-radius: 12px;
            padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .pkg-name { font-weight: bold; font-size: 16px; color: var(--btn-bg); text-align: left; }
        .pkg-desc { font-size: 12px; color: gray; margin-top: 3px; text-align: left; }
        .pkg-price { background: var(--gold-light); color: var(--btn-bg); padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }

        /* Күту экраны */
        #loading-ui { display: none; margin-top: 60px; }
        .spinner {
            width: 60px; height: 60px; border: 5px solid var(--gold-light);
            border-top: 5px solid var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 🖼 ДО/ПОСЛЕ (Бұрын/Кейін) СЛАЙДЕРІ */
        #result-ui { display: none; }
        .slider-container {
            position: relative; width: 100%; max-width: 400px; height: 350px;
            margin: 0 auto 20px; border-radius: 15px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 3px solid var(--gold);
        }
        .slider-container img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        /* Бұрынғы суретті кесу (clip-path) */
        #img-before { clip-path: inset(0 50% 0 0); }
        
        /* Ползуноктың өзі */
        .slider-input {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: ew-resize; z-index: 10;
        }
        /* Ползуноктың ортасындағы сызық */
        .slider-line {
            position: absolute; top: 0; left: 50%; width: 4px; height: 100%;
            background: white; z-index: 5; transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5); pointer-events: none;
        }
        .slider-button {
            position: absolute; top: 50%; left: 50%; width: 30px; height: 30px;
            background: white; border: 3px solid var(--gold); border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 6; pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }
        .slider-button::after { content: "↔"; color: var(--gold); font-weight: bold; font-size: 16px; }

        .download-btn {
            background: var(--accent); color: white; border: none; padding: 15px;
            font-size: 16px; border-radius: 15px; width: 100%; font-weight: bold; margin-bottom: 10px;
        }
        .new-photo-btn {
            background: transparent; color: var(--btn-bg); border: 2px solid var(--btn-bg);
            padding: 15px; font-size: 16px; border-radius: 15px; width: 100%; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('kz')">KZ</button>
        <button class="lang-btn" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>

    <div id="main-ui">
        <div class="header">Kelbet <span>AI</span></div>
        <div class="subtitle" id="t-subtitle">Жасанды интеллект арқылы фотоңызды жаңартыңыз</div>

        <label for="fileInput">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📸</div>
                <div style="font-weight: bold; font-size: 18px;" id="t-upload-title">Фото жүктеу</div>
                <div style="font-size: 12px; color: #7f8c8d; margin-top: 8px;" id="t-upload-desc">Түртіңіз немесе файл таңдаңыз</div>
            </div>
        </label>
        <input type="file" id="fileInput" accept="image/jpeg, image/png">

        <button class="main-btn" id="sendBtn"><span id="t-btn">ӨҢДЕУДІ БАСТАУ</span> ✨</button>

        <div class="packages-title" id="t-pkg-title">Қолжетімді генерациялар: <span style="background: var(--gold); color: white; padding: 2px 8px; border-radius: 10px;">2</span></div>
        
        <div class="package-card">
            <div>
                <div class="pkg-name">Көшпенді (Nomad)</div>
                <div class="pkg-desc" id="t-pkg1-desc">Жоғары сапа, 10 сурет</div>
            </div>
            <div class="pkg-price">100 ₸</div>
        </div>
        <div class="package-card" style="border-left-color: var(--accent);">
            <div>
                <div class="pkg-name">Хан (Khan)</div>
                <div class="pkg-desc" id="t-pkg2-desc">Премиум сапа, 30 сурет</div>
            </div>
            <div class="pkg-price" style="background: var(--accent); color: white;">300 ₸</div>
        </div>
    </div>

    <div id="loading-ui">
        <div class="spinner"></div>
        <div style="font-size: 20px; font-weight: bold; color: var(--btn-bg); margin-bottom: 10px;" id="t-load-title">Нейрожелі іске қосылды...</div>
        <div style="font-size: 14px; color: #7f8c8d;" id="t-load-desc">Бұл 10-15 секунд алуы мүмкін. Күте тұрыңыз...</div>
    </div>

    <div id="result-ui">
        <div class="header">Нәтиже</div>
        
        <div class="slider-container">
            <img id="img-after" src="" alt="After">
            <img id="img-before" src="" alt="Before">
            <div class="slider-line" id="slider-line"></div>
            <div class="slider-button" id="slider-button"></div>
            <input type="range" min="0" max="100" value="50" class="slider-input" id="compare-slider">
        </div>

        <button class="download-btn" id="t-download" onclick="tg.close()">Жүктеп алу (Чатқа сақтау) 💾</button>
        <button class="new-photo-btn" id="t-new" onclick="location.reload()">Жаңа фото жүктеу</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // --- СӨЗДІК ---
        const dict = {
            'kz': {
                'subtitle': 'Жасанды интеллект арқылы фотоңызды жаңартыңыз',
                'upload-title': 'Фото жүктеу', 'upload-desc': 'Түртіңіз немесе файл таңдаңыз',
                'btn': 'ӨҢДЕУДІ БАСТАУ', 'pkg-title': 'Қолжетімді генерациялар: <span style="background: var(--gold); color: white; padding: 2px 8px; border-radius: 10px;">2</span>',
                'pkg1-desc': 'Жоғары сапа, 10 сурет', 'pkg2-desc': 'Премиум сапа, 30 сурет',
                'load-title': 'Нейрожелі іске қосылды...', 'load-desc': 'Бұл 10-15 секунд алуы мүмкін. Күте тұрыңыз...',
                'download': 'Жүктеп алу (Чатқа сақтау) 💾', 'new': 'Жаңа фото жүктеу', 'success': 'Фото дайын! ✅'
            },
            'ru': {
                'subtitle': 'Улучшите качество фото с помощью ИИ',
                'upload-title': 'Загрузить фото', 'upload-desc': 'Нажмите или выберите файл',
                'btn': 'НАЧАТЬ ОБРАБОТКУ', 'pkg-title': 'Доступные генерации: <span style="background: var(--gold); color: white; padding: 2px 8px; border-radius: 10px;">2</span>',
                'pkg1-desc': 'Высокое качество, 10 фото', 'pkg2-desc': 'Премиум качество, 30 фото',
                'load-title': 'Нейросеть работает...', 'load-desc': 'Это займет 10-15 секунд. Пожалуйста, подождите...',
                'download': 'Скачать (Сохранить в чат) 💾', 'new': 'Загрузить новое фото', 'success': 'Фото готово! ✅'
            },
            'en': {
                'subtitle': 'Enhance your photo quality with AI',
                'upload-title': 'Upload Photo', 'upload-desc': 'Tap or select a file',
                'btn': 'START PROCESSING', 'pkg-title': 'Available generations: <span style="background: var(--gold); color: white; padding: 2px 8px; border-radius: 10px;">2</span>',
                'pkg1-desc': 'High quality, 10 photos', 'pkg2-desc': 'Premium quality, 30 photos',
                'load-title': 'AI is working...', 'load-desc': 'This will take 10-15 seconds. Please wait...',
                'download': 'Download (Save to chat) 💾', 'new': 'Upload new photo', 'success': 'Photo is ready! ✅'
            }
        };

        let currentLang = 'kz';
        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            const words = dict[lang];
            for (let key in words) { let el = document.getElementById('t-' + key); if(el) el.innerHTML = words[key]; }
            if(selectedFile) document.getElementById('t-upload-title').innerText = dict[lang]['success'];
        }

        // --- ЛОГИКА ---
        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const sendBtn = document.getElementById('sendBtn');
        
        let selectedFile = null;
        let localImageDataUrl = "";

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                selectedFile = this.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    localImageDataUrl = e.target.result; // "Бұрынғы" суретті сақтап қоямыз
                    uploadBox.innerHTML = '<div class="upload-icon">✅</div><div style="font-weight: bold; font-size: 18px; color: var(--accent);" id="t-upload-title">' + dict[currentLang]['success'] + '</div><div style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">' + selectedFile.name + '</div>';
                    uploadBox.style.borderColor = "var(--accent)";
                    sendBtn.style.display = 'block';
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        // --- ПОЛЗУНОК ЛОГИКАСЫ ---
        const slider = document.getElementById('compare-slider');
        const imgBefore = document.getElementById('img-before');
        const sliderLine = document.getElementById('slider-line');
        const sliderButton = document.getElementById('slider-button');

        slider.addEventListener('input', function(e) {
            const sliderValue = e.target.value;
            imgBefore.style.clipPath = `inset(0 ${100 - sliderValue}% 0 0)`;
            sliderLine.style.left = `${sliderValue}%`;
            sliderButton.style.left = `${sliderValue}%`;
        });

        // --- АМАЗОНҒА ЖІБЕРУ ЖӘНЕ КҮТУ ---
        sendBtn.addEventListener('click', function() {
            if (!selectedFile) return;
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('loading-ui').style.display = 'block';

            const base64Data = localImageDataUrl.split(',')[1];
            const userId = tg.initDataUnsafe?.user?.id || 'guest';
            
            // 🔴 1. СУРЕТТІ ӨҢДЕУГЕ ЖІБЕРЕТІН СІЛТЕМЕ (Сенің бұрынғы API Gateway сілтемең)
            const apiGatewayUrl = "https://0mwpwu9rhj.execute-api.eu-north-1.amazonaws.com/prod/"; 

            fetch(apiGatewayUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image_data: base64Data, user_id: userId })
            }).catch(err => console.log(err));

            // 🔴 2. МИНИ АПП 15 СЕКУНД КҮТІП БАРЫП, НӘТИЖЕНІ СҰРАЙДЫ
            // Әзірге бізде "Статус сұрайтын" бөлек API жоқ болғандықтан, 
            // Біз "Келбеттің" анимациясын көрсету үшін таймер қоямыз
            
            setTimeout(() => {
                // Магиялық экранды қосу
                document.getElementById('loading-ui').style.display = 'none';
                document.getElementById('result-ui').style.display = 'block';
                
                // "Бұрынғы" суретке өзіміздің түпнұсқаны қоямыз
                document.getElementById('img-before').src = localImageDataUrl;
                
                // "Кейінгі" суретке (Әзірге визуал үшін осыны қойып тұрамыз. 
                // Негізі бұл жерде Амазоннан келген URL тұруы керек)
                document.getElementById('img-after').src = localImageDataUrl; 
                
                // ЕСКЕРТУ: Нағыз жұмыс істеуі үшін бізге Амазоннан "status_api" ашу керек.
            }, 15000); // 15 секунд күтеді
        });
    </script>
</body>
</html>
