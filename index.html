<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelbet AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:ital,wght@1,600&display=swap');

        :root {
            --bg-color: #F8F6F0; /* Пастельді беж (Pinterest стилі) */
            --text-dark: #2C302E; /* Қою сұр/қара */
            --gold: #C5A059; /* Жұмсақ алтын */
            --gold-light: #EBE5D9;
            --accent: #0F4C5C; /* Қою теңіз толқыны */
            --btn-bg: #1B1E1C; /* Қараға жақын */
            --white: #FFFFFF;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-dark);
            margin: 0; padding: 25px 20px; text-align: center;
            /* Нақты қазақ оюы (векторлық) фон ретінде, өте нәзік */
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 0 C60 20 80 40 100 50 C80 60 60 80 50 100 C40 80 20 60 0 50 C20 40 40 20 50 0 Z" fill="%23C5A059" fill-opacity="0.05"/></svg>');
            background-size: 80px 80px;
        }
        
        /* Тіл ауыстыру */
        .lang-switch { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 30px; }
        .lang-btn { 
            background: transparent; border: 1.5px solid var(--gold); color: var(--gold); 
            padding: 6px 14px; border-radius: 20px; font-size: 11px; cursor: pointer; 
            font-weight: 600; transition: all 0.3s ease; letter-spacing: 0.5px;
        }
        .lang-btn.active { background: var(--gold); color: var(--white); border-color: var(--gold); box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3); }

        /* Басты тақырып (Playfair Display - элиталық шрифт) */
        .header { 
            font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 600; font-style: italic;
            color: var(--text-dark); margin-bottom: 8px; position: relative; letter-spacing: 1px; 
        }
        .header span { color: var(--gold); font-family: 'Montserrat', sans-serif; font-style: normal; font-weight: 800; font-size: 34px; }
        .subtitle { font-size: 13px; color: #6E716F; margin-bottom: 35px; font-weight: 400; line-height: 1.5; padding: 0 10px; }

        /* Фото жүктеу аймағы (Минимализм) */
        .upload-box { 
            background: var(--white); border: 1.5px dashed var(--gold); border-radius: 24px; 
            padding: 45px 20px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.03); 
            transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
        }
        .upload-box:active { transform: scale(0.98); }
        .upload-icon { font-size: 42px; margin-bottom: 12px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
        #fileInput { display: none; }

        /* Негізгі батырма */
        .main-btn { 
            background: var(--btn-bg); color: var(--white); border: none; padding: 18px 30px; 
            font-size: 15px; border-radius: 30px; width: 100%; font-weight: 600; letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(27, 30, 28, 0.3); margin-bottom: 35px; display: none; transition: 0.3s;
        }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 4px 15px rgba(27, 30, 28, 0.2); }

        /* Пакеттер дизайны */
        .packages-title { font-size: 16px; font-weight: 800; margin-bottom: 15px; color: var(--text-dark); text-align: left; padding-left: 5px; }
        .package-card { 
            background: var(--white); border-radius: 18px; padding: 18px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.02); border: 1px solid rgba(197, 160, 89, 0.2);
            position: relative; overflow: hidden;
        }
        /* Картаның сол жақ шетіндегі жіңішке сызық */
        .package-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--gold); }
        .pkg-name { font-weight: 800; font-size: 15px; color: var(--text-dark); text-align: left; margin-bottom: 4px; }
        .pkg-desc { font-size: 12px; color: #888; text-align: left; }
        .pkg-price { background: var(--gold-light); color: var(--text-dark); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 800; }

        /* Лоадинг анимациясы */
        #loading-ui { display: none; margin-top: 80px; }
        .spinner { 
            width: 50px; height: 50px; border: 3px solid var(--gold-light); 
            border-top: 3px solid var(--gold); border-radius: 50%; 
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; margin: 0 auto 25px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ДО/ПОСЛЕ СЛАЙДЕРІ */
        #result-ui { display: none; }
        .slider-container { 
            position: relative; width: 100%; max-width: 400px; height: 400px; margin: 0 auto 25px; 
            border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            border: 4px solid var(--white); background: #eee;
        }
        .slider-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #img-before { clip-path: inset(0 50% 0 0); }
        .slider-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: ew-resize; z-index: 10; }
        .slider-line { position: absolute; top: 0; left: 50%; width: 3px; height: 100%; background: var(--white); z-index: 5; transform: translateX(-50%); box-shadow: 0 0 15px rgba(0,0,0,0.4); pointer-events: none; }
        .slider-button { position: absolute; top: 50%; left: 50%; width: 36px; height: 36px; background: var(--white); border: 2px solid var(--gold); border-radius: 50%; transform: translate(-50%, -50%); z-index: 6; display: flex; justify-content: center; align-items: center; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .slider-button::after { content: "⟷"; color: var(--gold); font-weight: bold; font-size: 14px; }

        .download-btn { background: var(--accent); color: var(--white); border: none; padding: 18px; font-size: 15px; border-radius: 18px; width: 100%; font-weight: 600; margin-bottom: 12px; box-shadow: 0 8px 20px rgba(15, 76, 92, 0.2); }
        .new-photo-btn { background: var(--white); color: var(--text-dark); border: 1px solid #ddd; padding: 18px; font-size: 15px; border-radius: 18px; width: 100%; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('kz')">KZ</button>
        <button class="lang-btn" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>

    <div id="main-ui">
        <div class="header">Kelbet <span>AI</span></div>
        <div class="subtitle" id="t-subtitle">Жасанды интеллект арқылы фотоңыздың<br>сапасын мінсіз деңгейге көтеріңіз</div>

        <label for="fileInput">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">✦</div>
                <div style="font-weight: 800; font-size: 16px; margin-bottom: 6px;" id="t-upload-title">Фото жүктеу</div>
                <div style="font-size: 12px; color: #888;" id="t-upload-desc">Түртіңіз немесе файл таңдаңыз</div>
            </div>
        </label>
        <input type="file" id="fileInput" accept="image/jpeg, image/png">

        <button class="main-btn" id="sendBtn"><span id="t-btn">ӨҢДЕУДІ БАСТАУ</span> ✨</button>

        <div class="packages-title" id="t-pkg-title">Қолжетімді генерациялар: <span id="gen-count" style="background: var(--gold); color: white; padding: 3px 10px; border-radius: 12px; margin-left: 5px;">⏳</span></div>
        
        <div class="package-card">
            <div>
                <div class="pkg-name">Стандарт (Standard)</div>
                <div class="pkg-desc" id="t-pkg1-desc">7 генерация (сурет)</div>
            </div>
            <div class="pkg-price">199 ₸</div>
        </div>
        <div class="package-card" style="border-color: rgba(15, 76, 92, 0.2);">
            <style>.package-card:nth-child(5)::before { background: var(--accent); }</style>
            <div>
                <div class="pkg-name">Шексіз (Unlimited)</div>
                <div class="pkg-desc" id="t-pkg2-desc">Шексіз доступ (VIP)</div>
            </div>
            <div class="pkg-price" style="background: var(--accent); color: white;">399 ₸</div>
        </div>
    </div>

    <div id="loading-ui">
        <div class="spinner"></div>
        <div style="font-size: 18px; font-family: 'Playfair Display', serif; font-weight: 600; color: var(--text-dark); margin-bottom: 10px; font-style: italic;" id="t-load-title">Нейрожелі іске қосылды...</div>
        <div style="font-size: 13px; color: #888;" id="t-load-desc">Бұл 10-15 секунд алуы мүмкін. Күте тұрыңыз...</div>
    </div>

    <div id="result-ui">
        <div class="header" style="font-size: 26px; margin-bottom: 25px;">Нәтиже</div>
        <div class="slider-container">
            <img id="img-after" src="" alt="After">
            <img id="img-before" src="" alt="Before">
            <div class="slider-line" id="slider-line"></div>
            <div class="slider-button" id="slider-button"></div>
            <input type="range" min="0" max="100" value="50" class="slider-input" id="compare-slider">
        </div>
        <button class="download-btn" id="t-download" onclick="tg.close()">Жүктеп алу (Чатқа сақтау)</button>
        <button class="new-photo-btn" id="t-new" onclick="location.reload()">Жаңа фото жүктеу</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const dict = {
            'kz': {
                'subtitle': 'Жасанды интеллект арқылы фотоңыздың<br>сапасын мінсіз деңгейге көтеріңіз',
                'upload-title': 'Фото жүктеу', 'upload-desc': 'Түртіңіз немесе файл таңдаңыз',
                'btn': 'ӨҢДЕУДІ БАСТАУ', 'pkg-title': 'Қолжетімді генерациялар: <span id="gen-count" style="background: var(--gold); color: white; padding: 3px 10px; border-radius: 12px; margin-left: 5px;">⏳</span>',
                'pkg1-desc': '7 генерация (сурет)', 'pkg2-desc': 'Шексіз доступ (VIP)',
                'load-title': 'Нейрожелі іске қосылды...', 'load-desc': 'Бұл 10-15 секунд алуы мүмкін. Күте тұрыңыз...',
                'download': 'Жүктеп алу (Чатқа сақтау)', 'new': 'Жаңа фото жүктеу', 'success': 'Фото дайын! ✅'
            },
            'ru': {
                'subtitle': 'Улучшите качество вашего фото<br>с помощью искусственного интеллекта',
                'upload-title': 'Загрузить фото', 'upload-desc': 'Нажмите или выберите файл',
                'btn': 'НАЧАТЬ ОБРАБОТКУ', 'pkg-title': 'Доступные генерации: <span id="gen-count" style="background: var(--gold); color: white; padding: 3px 10px; border-radius: 12px; margin-left: 5px;">⏳</span>',
                'pkg1-desc': '7 генераций (фото)', 'pkg2-desc': 'Безлимитный доступ (VIP)',
                'load-title': 'Нейросеть работает...', 'load-desc': 'Это займет 10-15 секунд. Пожалуйста, подождите...',
                'download': 'Скачать (Сохранить в чат)', 'new': 'Загрузить новое фото', 'success': 'Фото готово! ✅'
            },
            'en': {
                'subtitle': 'Enhance your photo quality<br>with artificial intelligence',
                'upload-title': 'Upload Photo', 'upload-desc': 'Tap or select a file',
                'btn': 'START PROCESSING', 'pkg-title': 'Available generations: <span id="gen-count" style="background: var(--gold); color: white; padding: 3px 10px; border-radius: 12px; margin-left: 5px;">⏳</span>',
                'pkg1-desc': '7 generations (photos)', 'pkg2-desc': 'Unlimited access (VIP)',
                'load-title': 'AI is working...', 'load-desc': 'This will take 10-15 seconds. Please wait...',
                'download': 'Download (Save to chat)', 'new': 'Upload new photo', 'success': 'Photo is ready! ✅'
            }
        };

        let currentLang = 'kz';
        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            const words = dict[lang];
            for (let key in words) { let el = document.getElementById('t-' + key); if(el) el.innerHTML = words[key]; }
            if(selectedFile) document.getElementById('t-upload-title').innerText = dict[lang]['success'];
            if(window.currentGenerations !== undefined) {
                let el = document.getElementById('gen-count');
                if(el) el.innerText = window.currentGenerations;
            }
        }

        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const sendBtn = document.getElementById('sendBtn');
        const apiGatewayUrl = "https://0mwpwu9rhj.execute-api.eu-north-1.amazonaws.com/prod/"; 
        
        let selectedFile = null;
        let localImageDataUrl = "";

        window.onload = () => {
            const userId = tg.initDataUnsafe?.user?.id || 'guest';
            if (userId !== 'guest') {
                fetch(apiGatewayUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ check_status: true, user_id: userId })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.generations !== undefined) {
                        window.currentGenerations = data.generations; 
                        let el = document.getElementById('gen-count');
                        if(el) el.innerText = data.generations;
                    }
                }).catch(err => console.log(err));
            }
        };

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                selectedFile = this.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    localImageDataUrl = e.target.result;
                    uploadBox.innerHTML = '<div class="upload-icon" style="color: var(--gold);">✔</div><div style="font-weight: 800; font-size: 16px; margin-bottom: 6px; color: var(--gold);" id="t-upload-title">' + dict[currentLang]['success'] + '</div><div style="font-size: 12px; color: #888;">' + selectedFile.name + '</div>';
                    uploadBox.style.borderColor = "var(--gold)";
                    uploadBox.style.backgroundColor = "var(--gold-light)";
                    sendBtn.style.display = 'block';
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        const slider = document.getElementById('compare-slider');
        const imgBefore = document.getElementById('img-before');
        const sliderLine = document.getElementById('slider-line');
        const sliderButton = document.getElementById('slider-button');

        slider.addEventListener('input', function(e) {
            const sliderValue = e.target.value;
            imgBefore.style.clipPath = `inset(0 ${100 - sliderValue}% 0 0)`;
            sliderLine.style.left = `${sliderValue}%`;
            sliderButton.style.left = `${sliderValue}%`;
        });

        sendBtn.addEventListener('click', function() {
            if (!selectedFile) return;
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('loading-ui').style.display = 'block';

            const base64Data = localImageDataUrl.split(',')[1];
            const userId = tg.initDataUnsafe?.user?.id || 'guest';
            
            fetch(apiGatewayUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image_data: base64Data, user_id: userId })
            }).catch(err => console.log(err));

            let checkInterval = setInterval(() => {
                fetch(apiGatewayUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ check_status: true, user_id: userId })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'ready' && data.latest_photo) {
                        clearInterval(checkInterval); 
                        document.getElementById('loading-ui').style.display = 'none';
                        document.getElementById('result-ui').style.display = 'block';
                        document.getElementById('img-before').src = localImageDataUrl; 
                        document.getElementById('img-after').src = data.latest_photo;  
                    }
                })
                .catch(err => console.log("Күтілуде..."));
            }, 3000); 
        });
    </script>
</body>
</html>
